name: all_plugins

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'website/**'
      - '**.md'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'website/**'
      - '**.md'

jobs:
  analyze:
    timeout-minutes: 50
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"
      - uses: bluefireteam/melos-action@705015c3d2bc4ab94201ac24accb2bbe070cf533
        with:
          melos-version: '5.3.0'
      - name: 'Run Analyze'
        run: melos analyze-ci
      - name: 'Validate Workspace'
        if: always()
        run: melos run validate:workspace

  # Separated from "analyse" action as pubspec_override file is not being taken into account when running `flutter pub publish --dry-run`
  # This will fail on CI until this is fixed: https://github.com/invertase/melos/issues/467
  # You need to switch to Flutter 3.3.0, and run this test manually to check it works and update PR to confirm its success
  pub_dry_run:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"
      - uses: bluefireteam/melos-action@705015c3d2bc4ab94201ac24accb2bbe070cf533
        with:
          melos-version: '5.3.0'
      - name: 'Pub Check'
        run: |
          melos exec -c 1 --no-private --ignore="*example*" -- \
            dart pub publish --dry-run

  pub_get_check:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"
      - uses: bluefireteam/melos-action@705015c3d2bc4ab94201ac24accb2bbe070cf533
        with:
          melos-version: '5.3.0'
      - name: 'Flutter Pub Get'
        run: |
          melos exec -c 1 --scope="*example*" -- \
            "flutter pub get"

  format:
    # switch back to ubuntu-latest when swiftformat is working again
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"
      - uses: bluefireteam/melos-action@705015c3d2bc4ab94201ac24accb2bbe070cf533
        with:
          melos-version: '5.3.0'
      - uses: Homebrew/actions/setup-homebrew@master
      - name: 'Install Tools'
        run: |
          alias python=python3
          flutter pub global activate flutter_plugin_tools
          brew install swiftformat
          brew install clang-format
          brew link --overwrite --force clang-format
      - name: 'Formatter version'
        run: |
          clang-format --version
          swiftformat --version
      - name: 'Dart, Java, Objective-C and Swift'
        run: |
          flutter pub global run flutter_plugin_tools format --base-branch=origin/main
          ./.github/workflows/scripts/validate-formatting.sh

      # Clean generated build artificats(from format step) to prevent post run jobs from timing out
      - name: Clean generated build artifacts
        if: ${{ always() }}
        run: |
          rm -rf build
          find packages -type d -name build -prune -exec rm -rf {} +

  build_examples_dart:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'
          flutter-version: '3.41.9'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"
      - uses: bluefireteam/melos-action@705015c3d2bc4ab94201ac24accb2bbe070cf533
        with:
          melos-version: '5.3.0'
      - name: 'Build Examples'
        run: |
          melos exec -c 1 --scope="*example*" --dir-exists="web" -- \
            "flutter build web"
  swift-integration:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      FLUTTER_DEPENDENCIES: "cloud_firestore firebase_remote_config cloud_functions firebase_database firebase_auth firebase_storage firebase_analytics firebase_messaging firebase_app_check firebase_in_app_messaging firebase_performance firebase_crashlytics firebase_ml_model_downloader firebase_app_installations firebase_ai"
      PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'
          flutter-version: '3.41.9'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"
      - name: Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
      - uses: bluefireteam/melos-action@705015c3d2bc4ab94201ac24accb2bbe070cf533
        with:
          melos-version: '5.3.0'
      - name: Setup firebase_core example app to test Swift integration
        # Run after melos bootstrap so workspace pubspec_overrides resolve unpublished package versions.
        run: |
          cd packages/firebase_core/firebase_core/example
          flutter pub add $FLUTTER_DEPENDENCIES
          cd ../../../..
      - name: 'Swift Integration Setup'
        run: flutter config --enable-swift-package-manager
      - name: 'Build Apps with Swift Package Manager'
        run: dart ./.github/workflows/scripts/swift-integration.dart $FLUTTER_DEPENDENCIES

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"
      - uses: bluefireteam/melos-action@705015c3d2bc4ab94201ac24accb2bbe070cf533
        with:
          melos-version: '5.3.0'
      - name: 'Flutter Test'
        run: melos run test --no-select
      - name: 'Flutter Test - Web'
        run: melos run test:web --no-select

  check-files-license-headers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '^1.13.1'
      # Go is used by addlicense command (addlicense is used in melos run
      # check-license-header)
      - run: go install github.com/google/addlicense@latest
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"
      - name: Install Melos
        uses: bluefireteam/melos-action@705015c3d2bc4ab94201ac24accb2bbe070cf533
        with:
          # Running `melos bootstrap` is not needed because we use Melos just
          # for the `check-license-header` script.
          run-bootstrap: false
          melos-version: '5.3.0'
      - name: Check license header
        run: melos run check-license-header
