name: nightly-ci

# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: false

on:
  # schedule:
  #   - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode (skips Firestore tests)'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  e2e-android:
    uses: ./.github/workflows/android.yaml
    with:
      skip_firestore: ${{ github.event.inputs.test_mode == 'true' }}
    secrets: inherit
  e2e-ios:
    uses: ./.github/workflows/ios.yaml
    with:
      skip_firestore: ${{ github.event.inputs.test_mode == 'true' }}
    secrets: inherit
  e2e-macos:
    uses: ./.github/workflows/macos.yaml
    with:
      skip_firestore: ${{ github.event.inputs.test_mode == 'true' }}
    secrets: inherit
  e2e-web:
    uses: ./.github/workflows/web.yaml
    with:
      skip_firestore: ${{ github.event.inputs.test_mode == 'true' }}
    secrets: inherit
  e2e-windows:
    uses: ./.github/workflows/windows.yaml
    with:
      skip_firestore: ${{ github.event.inputs.test_mode == 'true' }}
    secrets: inherit
  e2e-fdc:
    uses: ./.github/workflows/e2e_tests_fdc.yaml
    secrets: inherit
  e2e-pipeline:
    uses: ./.github/workflows/e2e_tests_pipeline.yaml
    if: ${{ github.event.inputs.test_mode != 'true' }}
    secrets: inherit
