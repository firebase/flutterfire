name: nightly-ci

# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: false

on:
  # schedule:
  #   - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  e2e-android:
    uses: ./.github/workflows/android.yaml
    secrets: inherit
  e2e-ios:
    uses: ./.github/workflows/ios.yaml
    secrets: inherit
  e2e-macos:
    uses: ./.github/workflows/macos.yaml
    secrets: inherit
  e2e-web:
    uses: ./.github/workflows/web.yaml
    secrets: inherit
  e2e-windows:
    uses: ./.github/workflows/windows.yaml
    secrets: inherit
  e2e-fdc:
    uses: ./.github/workflows/e2e_tests_fdc.yaml
    secrets: inherit
  e2e-pipeline:
    uses: ./.github/workflows/e2e_tests_pipeline.yaml
    secrets: inherit
