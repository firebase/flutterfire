              sys.exit(124)

          output = normalize_output(completed.stdout)
          print(output, end='')
          with open('output.log', 'w') as file:
              file.write(output)
          sys.exit(completed.returncode)
          PY
            exit_code=$?
            kill "$chromedriver_pid" 2>/dev/null || true
