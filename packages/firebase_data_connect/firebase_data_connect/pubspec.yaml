name: firebase_data_connect
description: 'Flutter plugin for Firebase Data Connect, a relational database service that lets you build and scale using a fully-managed PostgreSQL database powered by Cloud SQL.'
version: 0.3.0+2
resolution: workspace
homepage: https://firebase.google.com/docs/data-connect/quickstart?platform=flutter
false_secrets:
  - example/**
  - dartpad/**

environment:
  sdk: '^3.6.0'
  flutter: '>=3.27.0'

dependencies:
  crypto: ^3.0.6
  firebase_app_check: ^0.4.4+1
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  firebase_core_platform_interface: ^7.0.1
  fixnum: ^1.1.1
  flutter:
    sdk: flutter
  grpc: ^4.0.1
  http: ^1.2.1
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.0.0
  protobuf: ^3.1.0
  sqlite3: '>=2.9.0 <4.0.0'
  sqlite3_flutter_libs: ^0.5.40
  web_socket_channel: ^3.0.1

dev_dependencies:
  build_runner: ^2.4.12
  firebase_app_check_platform_interface: ^0.4.0+1
  firebase_auth_platform_interface: ^9.0.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.0.0
  plugin_platform_interface: ^2.1.3
