resolution: workspace
publish_to: 'none'

environment:
  sdk: '^3.6.0'
  flutter: '>=3.27.0'

dependencies:
  firebase_analytics: ^12.4.3
  firebase_core: ^4.11.0
  firebase_in_app_messaging: ^0.9.2+4
  firebase_in_app_messaging_platform_interface: ^0.2.5+24
  flutter:
    sdk: flutter

flutter:
  uses-material-design: true
