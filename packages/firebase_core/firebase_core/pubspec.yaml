name: firebase_core
description: Flutter plugin for Firebase Core, enabling connecting to multiple
  Firebase apps.
homepage: https://firebase.google.com/docs/flutter/setup
repository: https://github.com/firebase/flutterfire/tree/main/packages/firebase_core/firebase_core
version: 4.12.1
resolution: workspace
topics:
  - firebase
  - core

false_secrets:
  - example/**

environment:
  sdk: '^3.6.0'
  flutter: '>=3.27.0'

dependencies:
  firebase_core_platform_interface: ^8.0.0
  firebase_core_web: ^3.9.1
  flutter:
    sdk: flutter
  meta: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.0.0
  plugin_platform_interface: ^2.1.3

flutter:
  plugin:
    platforms:
      android:
        package: io.flutter.plugins.firebase.core
        pluginClass: FlutterFirebaseCorePlugin
      ios:
        pluginClass: FLTFirebaseCorePlugin
      macos:
        pluginClass: FLTFirebaseCorePlugin
      web:
        default_package: firebase_core_web
      windows:
        pluginClass: FirebaseCorePluginCApi

firebase:
  google_services_gradle_plugin_version: '4.4.4'
  crashlytics_gradle_plugin_version: '3.0.7'
  performance_gradle_plugin_version: '2.0.2'
