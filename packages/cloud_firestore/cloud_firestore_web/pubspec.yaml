name: cloud_firestore_web
description: The web implementation of cloud_firestore
homepage: https://github.com/firebase/flutterfire/tree/main/packages/cloud_firestore/cloud_firestore_web
repository: https://github.com/firebase/flutterfire/tree/main/packages/cloud_firestore/cloud_firestore_web

version: 5.7.1
resolution: workspace

environment:
  sdk: '^3.6.0'
  flutter: '>=3.22.0'

dependencies:
  _flutterfire_internals: ^1.3.75
  cloud_firestore_platform_interface: ^8.0.5
  collection: ^1.0.0
  firebase_core: ^4.12.1
  firebase_core_web: ^3.9.0
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  firebase_core_platform_interface: ^8.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.0.0

flutter:
  plugin:
    platforms:
      web:
        pluginClass: FirebaseFirestoreWeb
        fileName: cloud_firestore_web.dart
